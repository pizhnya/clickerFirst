<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Clicker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game">
      <h1>Simple Clicker</h1>
      <p class="score">Score: <span id="score">0</span></p>

      <div id="sceneContainer" class="scene" aria-label="3D clickable rose">
        <div id="flashOverlay" class="flash-overlay" aria-hidden="true"></div>
      </div>
      <p class="scene-hint">Click the rose to gain +<span id="clickPower">1</span></p>

      <section class="upgrade">
        <h2>Upgrade</h2>
        <p>Level: <span id="upgradeLevel">0</span></p>
        <p>Price: <span id="upgradePrice">10</span></p>
        <button id="upgradeBtn">Buy Upgrade (+1 click power)</button>
      </section>

      <p id="message" class="message"></p>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
